<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sufyan Digital Services</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050816,#1a1446,#050816);
color:white;
}

/* HEADER */
header{
padding:25px;
text-align:center;
font-size:28px;
font-weight:bold;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
}

.sub{
text-align:center;
color:#a5b4fc;
margin-top:-10px;
}

/* CONTAINER */
.container{
max-width:950px;
margin:auto;
padding:20px;
box-sizing:border-box;
}

/* SEARCH FIXED */
input{
width:100%;
max-width:100%;
box-sizing:border-box;
padding:14px;
border-radius:12px;
border:none;
outline:none;
margin:15px 0;
font-size:16px;
display:block;
}

/* CARD */
.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
margin:12px 0;
border-radius:16px;
cursor:pointer;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
transition:0.25s;
}

.card:hover{
transform:scale(1.02);
background:rgba(99,102,241,0.2);
}

.left{
display:flex;
flex-direction:column;
}

.title{
font-size:17px;
font-weight:bold;
}

.price{
color:#22c55e;
font-weight:bold;
margin-top:5px;
}

/* QTY */
.controls{
display:flex;
align-items:center;
gap:10px;
}

.btn{
background:#6366f1;
border:none;
color:white;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.qty{
min-width:25px;
text-align:center;
font-weight:bold;
}

/* TOTAL */
.total{
text-align:center;
font-size:24px;
margin:20px 0;
font-weight:bold;
color:#22c55e;
}

/* BUTTON */
.order{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(90deg,#6366f1,#22c55e,#06b6d4);
color:white;
transition:0.3s;
}

.order:hover{
transform:scale(1.03);
}

.note{
text-align:center;
font-size:13px;
color:#94a3b8;
margin-top:10px;
}

/* FLOAT CART */
.float{
position:fixed;
bottom:20px;
right:20px;
background:rgba(0,0,0,0.7);
padding:12px 18px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
}

/* CASH BUTTON */
.cashBtn{
width:100%;
margin-top:10px;
padding:14px;
border:none;
border-radius:12px;
background:#f59e0b;
color:black;
font-weight:bold;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-box{
background:#111827;
padding:20px;
border-radius:12px;
width:90%;
max-width:400px;
text-align:center;
}

.close{
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<header>🚀 Sufyan Digital Services</header>
<div class="sub">Premium Freelancing Services</div>

<div class="container">

<input type="text" id="search" placeholder="Search services...">

<div id="box"></div>

<div class="total">
Total: Rs <span id="total">0</span>
</div>

<button class="order" onclick="send()">
🔥 Order on WhatsApp
</button>

<button class="cashBtn" onclick="openCash()">
💳 View JazzCash Info
</button>

<div class="note">
⚡ Fast delivery | Limited slots daily
</div>

</div>

<div class="float">
Cart: Rs <span id="floatTotal">0</span>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h2>💳 Payment Info</h2>
<p><b>JazzCash Number:</b></p>
<h3>03114143566</h3>
<p>Send payment screenshot on WhatsApp for confirmation.</p>
<button class="close" onclick="closeCash()">Close</button>
</div>
</div>

<script>

const services=[
{name:"Simple CV Making",price:100},
{name:"Logo Design",price:200},
{name:"Document Design",price:400},
{name:"Assignment Help",price:800},
{name:"Landing Page Website",price:3000}
];

let cart=new Array(services.length).fill(0);

function render(){
let box=document.getElementById("box");
box.innerHTML="";

services.forEach((s,i)=>{

let div=document.createElement("div");
div.className="card";

div.onclick=()=>{if(cart[i]==0) cart[i]=1;update();};

div.innerHTML=`
<div class="left">
<div class="title">${s.name}</div>
<div class="price">Rs ${s.price}</div>
</div>

<div class="controls" onclick="event.stopPropagation()">
<button class="btn" onclick="dec(${i})">-</button>
<div class="qty">${cart[i]}</div>
<button class="btn" onclick="inc(${i})">+</button>
</div>
`;

box.appendChild(div);
});
}

function inc(i){cart[i]++;update();}
function dec(i){if(cart[i]>0) cart[i]--;update();}

function update(){
render();

let total=0;
services.forEach((s,i)=>{
total+=cart[i]*s.price;
});

document.getElementById("total").innerText=total;
document.getElementById("floatTotal").innerText=total;
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"flex":"none";
});
});

/* WHATSAPP */
function send(){

let items=[];
let total=0;

services.forEach((s,i)=>{
if(cart[i]>0){
let t=cart[i]*s.price;
total+=t;
items.push(`${s.name} x${cart[i]} = Rs ${t}`);
}
});

if(items.length==0){
alert("Please select services");
return;
}

let msg=
`🔥 Sufyan Digital Services

Order:
${items.join("\n")}

Total: Rs ${total}

Fast delivery available 🚀`;

window.open("https://wa.me/923114143566?text="+encodeURIComponent(msg));
}

/* MODAL */
function openCash(){
document.getElementById("modal").style.display="flex";
}

function closeCash(){
document.getElementById("modal").style.display="none";
}

render();
</script>

</body>
</html>
